# =========================================================
# 전자정부프레임워크 학습 프로젝트 - 설정 파일
# =========================================================

# ---------------------------------------------------------
# 서버 설정
# ---------------------------------------------------------
server.port=8080

# ---------------------------------------------------------
# JSP View 설정
# (전자정부프레임워크는 JSP를 기본 View로 사용)
# ---------------------------------------------------------
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# 한글 인코딩
spring.web.resources.charset=UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ---------------------------------------------------------
# H2 인메모리 DB 설정 (학습용 - 서버 재시작 시 데이터 초기화)
# ---------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:egovdb;MODE=MySQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 웹 콘솔 (http://localhost:8080/h2-console 에서 DB 직접 확인 가능)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 초기 SQL 스크립트 실행
spring.sql.init.schema-locations=classpath:sql/schema.sql
spring.sql.init.data-locations=classpath:sql/data.sql
spring.sql.init.mode=always

# ---------------------------------------------------------
# MyBatis 설정
# ---------------------------------------------------------
# Mapper XML 위치
mybatis.mapper-locations=classpath:mapper/*.xml

# VO 클래스 typeAlias 자동 등록 (패키지 내 모든 클래스)
# BoardVO → boardVO 로 Mapper XML에서 사용 가능
mybatis.type-aliases-package=com.example.egov.board.vo

# DB 컬럼명(board_no)을 자동으로 camelCase(boardNo)로 변환
mybatis.configuration.map-underscore-to-camel-case=true

# SQL 실행 로그 출력 (개발 중 쿼리 확인용)
logging.level.com.example.egov=DEBUG
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
